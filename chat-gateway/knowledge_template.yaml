- slug: coffee-machines
  title: Ремонт кавових апаратів
  description: Ремонт, чистка та обслуговування автоматичних і рожкових кавомашин
  detailed_description: 'Ремонтуємо та обслуговуємо кавомашини і кавові апарати у
    Львові. Працюємо з Saeco, DeLonghi, Jura, Philips, Krups, Bosch, Siemens, Nivona,
    Gaggia, Miele та іншими автоматичними і рожковими моделями.


    Під час діагностики перевіряємо помпу, бойлер, термоблок, заварювальний блок,
    кавомолку, клапани, ущільнювачі, датчики, плату керування і гідросистему. Часті
    звернення: кавомашина не подає воду, протікає, не меле каву, не гріє, видає помилку
    або потребує декальцинації.



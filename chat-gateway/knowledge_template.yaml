    високовольтний блок, запобіжники і слюдяну пластину.


    Після діагностики пояснюємо, чи є сенс ремонтувати пристрій, які деталі потрібні
    і скільки це коштуватиме. Ремонт починаємо тільки після погодження вартості.'

global_faq:
- question: Скільки часу займає діагностика та ремонт?
  answer: Стандартна діагностика зазвичай займає від 1 до 3 робочих днів. Більшість
    ремонтів ми виконуємо за 1-2 дні після погодження вартості.
- question: Скільки коштує діагностика, якщо я відмовлюсь від ремонту?
  answer: Діагностика безкоштовна за умови подальшого ремонту в нашому сервісному
    центрі. У разі відмови від ремонту оплачується лише базова вартість діагностики.
- question: Чи надаєте ви гарантію на виконані роботи?
  answer: Так, ми надаємо гарантію на всі види ремонтних робіт та встановлені запчастини.
    Термін гарантії залежить від типу послуги та деталі.

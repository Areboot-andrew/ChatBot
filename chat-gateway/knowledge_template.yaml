- slug: power-stations
  title: Ремонт портативних зарядних станцій
  description: Ремонт зарядних станцій, повербанків, BMS та інверторних блоків
  detailed_description: 'Виконуємо ремонт портативних зарядних станцій, повербанків
    та інверторних блоків у Львові. Працюємо з EcoFlow, Bluetti, Anker, Jackery, Xiaomi,
    Zendure та іншими пристроями, де важлива правильна діагностика батареї, BMS, інвертора

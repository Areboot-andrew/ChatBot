    Перевіряємо причини типових несправностей: станція не вмикається, не заряджається,
    не видає 220В, показує помилки, швидко втрачає ємність або має пошкоджені порти.
    Окремо діагностуємо вентилятори охолодження, MPPT-контролери, роз''єми XT60, USB,
    DC та мережевий вихід.


    Можливі роботи: ремонт плат BMS, відновлення інвертора, заміна роз''ємів, ремонт
    зарядної частини, відновлення після глибокого розряду та заміна акумуляторних
    елементів після узгодження вартості.'
